name: Test, Build and Release

on:
  push:
    branches: [ main ]
    paths:
    - '**.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - 'scripts/build.sh'
    - '.github/workflows/test-build-release.yml'
  pull_request:
    branches: [ main ]
    paths:
    - '**.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - 'scripts/build.sh'
    - '.github/workflows/test-build-release.yml'
  release:
    types: [ created ]

permissions:
  pull-requests: read
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod
    - name: Test
      run: go test -v ./...

  binary:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    strategy:
      matrix:
        goos: [ darwin, linux, windows ]
        goarch: [ amd64, arm64 ]
        mode: [ slim, debug ]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod
    - id: build
      name: Build
      run: |
        output=shape-packer-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.mode }}" = "debug" ]; then
          output=${output}-debug
        fi
        if [ "${{ matrix.goos }}" = "windows" ]; then
          output="${output}.exe"
        fi
        ./scripts/build.sh ${{ matrix.goos }} ${{ matrix.goarch }} ${{ matrix.mode }} "${output}"
        echo "artifact=${output}" >> "$GITHUB_OUTPUT"
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: shape-packer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.mode == 'debug' && '-debug' || '' }}
        path: ${{ steps.build.outputs.artifact }}

  container:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release'
    strategy:
      matrix:
        mode: [ slim, debug ]
    steps:
    - uses: actions/checkout@v6
    - name: Validate release tag
      if: github.event_name == 'release'
      run: |
        tag="${{ github.event.release.tag_name }}"
        if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
          echo "Release tag must use semantic versioning like v1.2.3"
          exit 1
        fi
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value={{branch}},enable=${{ github.event_name != 'release' && matrix.mode == 'slim' }}
          type=raw,value={{branch}}-debug,enable=${{ github.event_name != 'release' && matrix.mode == 'debug' }}
          type=raw,value={{tag}},enable=${{ github.event_name == 'release' && matrix.mode == 'slim' }}
          type=raw,value={{tag}}-debug,enable=${{ github.event_name == 'release' && matrix.mode == 'debug' }}
          type=raw,value=latest,enable=${{ github.event_name == 'release' && matrix.mode == 'slim' }}
    - name: Build and push container
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        target: ${{ matrix.mode == 'debug' && 'runtime-debug' || 'runtime-slim' }}
        build-args: |
          MODE=${{ matrix.mode }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-slim
    needs: [ binary, container ]
    if: github.event_name == 'release'
    steps:
    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        merge-multiple: true
    - name: Upload to release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/shape-packer*
        tag_name: ${{ github.event.release.tag_name }}
