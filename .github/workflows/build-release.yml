name: Build and Release

on:
  push:
    branches: [ '*' ]
    paths:
    - 'polygon_packer.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - '.github/workflows/build-release.yml'
  pull_request:
    branches: [ '*' ]
    paths:
    - 'polygon_packer.go'
    - 'go.mod'
    - 'go.sum'
    - 'Dockerfile'
    - '.dockerignore'
    - '.github/workflows/build-release.yml'
  release:
    types: [ created ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [ darwin, linux, windows ]
        goarch: [ amd64, arm64 ]
        mode: [ slim, debug ]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ./go.mod

    - name: Build
      run: |
        output=polygon-packer-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.mode }}" = "debug" ]; then
          output=${output}-debug
        fi
        CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
          $([[ "${{ matrix.mode }}" = "slim" ]] && echo "-ldflags='-s -w' -trimpath") \
          -o "${output}" .
        if [ "${{ matrix.goos }}" = "windows" ]; then
          mv "${output}" "${output}.exe"
          output="${output}.exe"
        fi
        echo "artifact=${output}" >> $GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: polygon-packer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.mode == 'debug' && '-debug' || '' }}
        path: ${{ steps.Build.outputs.artifact }}

  container:
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
    - uses: actions/checkout@v6

    - name: Validate release tag
      if: github.event_name == 'release'
      run: |
        tag="${{ github.event.release.tag_name }}"
        if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
          echo "Release tag must use semantic versioning like v1.2.3"
          exit 1
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
          type=raw,value=latest,enable=${{ github.event_name == 'release' }}

    - name: Build and push container
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [ container ]
    if: github.event_name == 'release'

    steps:
    - name: Download binaries
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        merge-multiple: true

    - name: Upload to release
      uses: softprops/action-gh-release@v3
      with:
        files: artifacts/*
        tag_name: ${{ github.event.release.tag_name }}
